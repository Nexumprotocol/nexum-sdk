[package]
name = "nexum-sdk"
version = "0.1.0"
edition = "2021"
description = "Official Rust SDK for NEXUM Protocol on Solana"
license = "MIT"
authors = ["NEXUM Protocol <protocolnexum@gmail.com>"]
repository = "https://github.com/Nexumprotocol/nexum-sdk"
keywords = ["solana","nexum","web3","blockchain","defi"]

[dependencies]
solana-sdk    = "1.18"
solana-client = "1.18"
solana-account-decoder = "1.18"
reqwest   = {version="0.12",features=["json"]}
thiserror = "1.0"
tokio     = {version="1",features=["full"]}
serde     = {version="1.0",features=["derive"]}
serde_json = "1.0"
base58 = "0.2"
